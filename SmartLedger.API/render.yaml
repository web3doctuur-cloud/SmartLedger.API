services:
  - type: web
    name: smartledger-api
    runtime: image
    repo: https://github.com/YOUR_USERNAME/SmartLedger
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: smartledger-db
          property: connectionString
    dockerfilePath: ./SmartLedger.API/Dockerfile